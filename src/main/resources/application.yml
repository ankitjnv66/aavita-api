spring:
  application:
    name: aavita-api

  datasource:
    url: jdbc:postgresql://localhost:5432/AavitaDB
    username:
    password:
    hikari:
      max-lifetime: 600000        # 10 min (default 30min — too long for local Postgres)
      keepalive-time: 300000      # ping every 5 min to keep connections alive

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 9090

