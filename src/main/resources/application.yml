#With TLS
mqtt:
  enabled: ${MQTT_ENABLED:true}
  broker: ${MQTT_BROKER:ssl://localhost:8883}
  client-id: ${MQTT_CLIENT_ID:JavaClient}
  subscribe-topic: ${MQTT_SUBSCRIBE_TOPIC:+/+/sub}
  tls:
    truststore: ${MQTT_TLS_TRUSTSTORE:classpath:certs/aavita-truststore.jks}
    truststore-password: ${MQTT_TLS_TRUSTSTORE_PASSWORD:aavita123}

logging:
  level:
    root: INFO
    com.aavita: INFO
    org.springframework.security: WARN

alexa:
  shared-secret: ${ALEXA_SHARED_SECRET:Aavita@Alexa#2026}
  # This value must match the X-Alexa-Secret header configured in Alexa Developer Console
  # For production: set ALEXA_SHARED_SECRET environment variable, do not hardcode

springdoc:
